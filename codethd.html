<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محاكي Codethd</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: #1e1e1e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .main-editor { display: flex; flex: 1; gap: 2px; background: #333; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; }
        .panel-header { background: #252525; padding: 5px 15px; font-size: 0.8rem; color: #888; text-align: left; }
        
        /* ضبط المحرر ليكون دائماً من اليسار لليمين لحل مشكلة تداخل الرموز */
        textarea { 
            flex: 1; background: #151515; border: none; color: #0f0; 
            padding: 15px; resize: none; outline: none; 
            font-family: 'Courier New', Courier, monospace; 
            direction: ltr; text-align: left; 
        }
        
        #preview-area { flex: 1; background: #fff; border: none; width: 100%; height: 100%; }
        .preview-container { flex: 1; display: flex; flex-direction: column; background: #fff; }
    </style>
</head>
<body>

<header>
    <div class="logo">Codethd</div>
</header>

<main class="main-editor">
    <div class="panel">
        <div class="panel-header">HTML</div>
        <textarea id="html-code" placeholder="<html>...</html>"><div class="box">أهلاً بك في Codethd!</div></textarea>
    </div>
    <div class="panel">
        <div class="panel-header">CSS</div>
        <textarea id="css-code" placeholder="body { ... }">.box { background: tomato; padding: 20px; color: white; border-radius: 8px; text-align: center; }</textarea>
    </div>
    <div class="panel">
        <div class="panel-header">JS</div>
        <textarea id="js-code" placeholder="console.log('...');">console.log('الكود يعمل بشكل جيد!');</textarea>
    </div>
    <div class="preview-container">
        <div class="panel-header" style="background:#ddd; color:#000; text-align: center;">النتيجة (Preview)</div>
        <iframe id="preview-area"></iframe>
    </div>
</main>

<script>
    function updatePreview() {
        const html = document.getElementById('html-code').value;
        const css = document.getElementById('css-code').value;
        const js = document.getElementById('js-code').value;
        const preview = document.getElementById('preview-area');
        
        const doc = preview.contentDocument || preview.contentWindow.document;
        doc.open();
        doc.write(`
            <html>
                <head>
                    <style>${css}</style>
                </head>
                <body>
                    ${html}
                    <script>${js}<\/script>
                </body>
            </html>
        `);
        doc.close();
    }

    document.querySelectorAll('textarea').forEach(el => {
        el.addEventListener('input', updatePreview);
    });

    updatePreview();
</script>

</body>
</html>

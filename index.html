<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي Codethd - محرر الكود الاحترافي</title>
    <link rel="stylesheet" href="styles.css">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.css">
</head>
<body>

<div class="theme-toggle" id="themeToggle" title="تبديل الوضع الليلي/الفاتح">
    <span class="theme-icon">🌙</span>
</div>

<header>
    <div class="logo">
        <span class="logo-icon">💻</span>
        <span>Codethd</span>
    </div>
    <div class="header-actions">
        <button class="btn btn-secondary" id="importBtn" title="استيراد مشروع (Ctrl+I)">📥 استيراد</button>
        <button class="btn btn-secondary" id="clearBtn" title="مسح الكل (Ctrl+L)">🗑️ مسح الكل</button>
        <button class="btn btn-primary" id="exportBtn" title="تنزيل المشروع (Ctrl+E)">📥 تنزيل</button>
    </div>
</header>

<div class="tabs-container" id="tabsContainer">
    <button class="tab-btn active" data-tab="html-tab" title="كود HTML">📝 HTML</button>
    <button class="tab-btn" data-tab="css-tab" title="كود CSS">🎨 CSS</button>
    <button class="tab-btn" data-tab="js-tab" title="كود JavaScript">⚙️ JS</button>
    <button class="tab-btn" data-tab="preview-tab" title="معاينة النتيجة">👁️ النتيجة</button>
    <button class="tab-btn" data-tab="console-tab" title="وحدة التحكم">💬 Console</button>
</div>

<main class="main-editor">
    <!-- HTML Panel -->
    <div class="panel" id="html-tab">
        <div class="panel-header">
            <span class="panel-icon">📝</span>
            <span>HTML</span>
            <button class="copy-btn" data-copy="html-code" title="نسخ الكود">📋</button>
        </div>
        <div id="html-editor" class="editor-wrapper"></div>
    </div>

    <!-- CSS Panel -->
    <div class="panel" id="css-tab">
        <div class="panel-header">
            <span class="panel-icon">🎨</span>
            <span>CSS</span>
            <button class="copy-btn" data-copy="css-code" title="نسخ الكود">📋</button>
        </div>
        <div id="css-editor" class="editor-wrapper"></div>
    </div>

    <!-- JavaScript Panel -->
    <div class="panel" id="js-tab">
        <div class="panel-header">
            <span class="panel-icon">⚙️</span>
            <span>JavaScript</span>
            <button class="copy-btn" data-copy="js-code" title="نسخ الكود">📋</button>
        </div>
        <div id="js-editor" class="editor-wrapper"></div>
    </div>

    <!-- Preview Panel -->
    <div class="preview-container" id="preview-tab">
        <div class="panel-header" style="background:#ddd; color:#000;">
            <span class="panel-icon">👁️</span>
            <span>النتيجة (Preview)</span>
        </div>
        <iframe id="preview-area" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <!-- Console Panel -->
    <div class="panel" id="console-tab">
        <div class="panel-header">
            <span class="panel-icon">💬</span>
            <span>Console</span>
            <button class="copy-btn" id="clearConsoleBtn" title="مسح السجل">🗑️</button>
        </div>
        <div id="console-output" class="console-output"></div>
    </div>
</main>

<!-- Hidden textarea for storing code -->
<textarea id="html-code" style="display:none;"><div class="box">أهلاً بك في Codethd!</div></textarea>
<textarea id="css-code" style="display:none;">.box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; border-radius: 8px; text-align: center; font-size: 18px; }</textarea>
<textarea id="js-code" style="display:none;">console.log('مرحباً! الكود يعمل بشكل جيد! 🎉');</textarea>

<div class="floating-particles" id="particles"></div>

<!-- Resize handle for desktop -->
<div class="resize-handles-container" id="resizeHandles"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/css-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/javascript-hint.min.js"></script>

<script src="script.js"></script>
</body>
</html>

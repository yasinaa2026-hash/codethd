<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي Codethd - محرر الكود الاحترافي</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="theme-toggle" id="themeToggle">
    <span class="theme-icon">🌙</span>
</div>

<header>
    <div class="logo">
        <span class="logo-icon">💻</span>
        <span>Codethd</span>
    </div>
    <div class="header-actions">
        <button class="btn btn-secondary" id="clearBtn">مسح الكل</button>
        <button class="btn btn-primary" id="exportBtn">تنزيل HTML</button>
    </div>
</header>

<main class="main-editor">
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📝</span>
            HTML
        </div>
        <textarea id="html-code" placeholder="&lt;html&gt;...&lt;/html&gt;"><div class="box">أهلاً بك في Codethd!</div></textarea>
    </div>
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">🎨</span>
            CSS
        </div>
        <textarea id="css-code" placeholder="body { ... }">.box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; color: white; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; }</textarea>
    </div>
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">⚙️</span>
            JavaScript
        </div>
        <textarea id="js-code" placeholder="console.log('...');">console.log('الكود يعمل بشكل جيد!');</textarea>
    </div>
    <div class="preview-container">
        <div class="panel-header" style="background:#ddd; color:#000;">
            <span class="panel-icon">👁️</span>
            النتيجة (Preview)
        </div>
        <iframe id="preview-area" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
</main>

<div class="floating-particles" id="particles"></div>

<script src="script.js"></script>
</body>
</html>
